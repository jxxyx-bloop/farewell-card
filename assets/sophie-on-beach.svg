<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Sky gradient simulation -->
  <rect x="0" y="0" width="240" height="180" fill="#B2EBF2"/>

  <!-- Sun -->
  <circle cx="190" cy="40" r="24" fill="#FFD700"/>
  <line x1="190" y1="10" x2="190" y2="4" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="210" y1="20" x2="216" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="40" x2="226" y2="40" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>

  <!-- Ocean horizon -->
  <rect x="0" y="155" width="240" height="35" fill="#26C6DA"/>
  <path d="M0,155 Q60,145 120,155 Q180,165 240,155" fill="#80DEEA"/>

  <!-- Sand beach -->
  <path d="M0,178 Q60,165 120,172 Q180,179 240,168 L240,300 L0,300Z" fill="#F5DEB3"/>

  <!-- Towel on sand -->
  <ellipse cx="120" cy="225" rx="70" ry="22" fill="#FF6B6B"/>
  <path d="M58,218 Q120,210 182,218" stroke="#FFD700" stroke-width="4" fill="none"/>
  <path d="M58,228 Q120,220 182,228" stroke="#FFD700" stroke-width="4" fill="none"/>

  <!-- Body lying sideways — teal swimsuit -->
  <ellipse cx="120" cy="228" rx="60" ry="20" fill="#26C6DA"/>

  <!-- Legs extended -->
  <ellipse cx="182" cy="230" rx="28" ry="10" fill="#FFD6B3" transform="rotate(5 182 230)"/>
  <ellipse cx="60" cy="236" rx="14" ry="9" fill="#FFD6B3"/>

  <!-- Head propped on hand -->
  <ellipse cx="74" cy="185" rx="18" ry="12" fill="#FFD6B3" transform="rotate(-30 74 185)"/>

  <!-- Hair back -->
  <ellipse cx="68" cy="168" rx="52" ry="50" fill="#FF8C42"/>

  <!-- Face -->
  <circle cx="68" cy="180" r="46" fill="#FFD6B3"/>

  <!-- Sunglasses -->
  <rect x="38" y="170" width="26" height="17" rx="8" fill="#333" opacity="0.85"/>
  <rect x="68" y="170" width="26" height="17" rx="8" fill="#333" opacity="0.85"/>
  <line x1="64" y1="178" x2="68" y2="178" stroke="#333" stroke-width="3"/>
  <rect x="36" y="172" width="4" height="12" rx="2" fill="#555"/>
  <rect x="94" y="172" width="4" height="12" rx="2" fill="#555"/>

  <!-- Cheeks visible below sunglasses -->
  <ellipse cx="44" cy="192" rx="11" ry="7" fill="#FFAAAA" opacity="0.55"/>
  <ellipse cx="92" cy="192" rx="11" ry="7" fill="#FFAAAA" opacity="0.55"/>

  <!-- Relaxed smile -->
  <path d="M48,198 Q68,216 88,198" fill="#FF9999" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M48,198 Q68,208 88,198" fill="white"/>

  <!-- Hair strands -->
  <path d="M28,162 Q18,126 52,122" stroke="#FF8C42" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M106,164 Q112,124 84,122" stroke="#FF8C42" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Bow -->
  <path d="M58,130 Q68,120 78,130 Q68,140 58,130Z" fill="#FF9EC8"/>
  <circle cx="68" cy="130" r="5" fill="#FF6BA8"/>

  <!-- Arm propping up head -->
  <ellipse cx="66" cy="208" rx="20" ry="10" fill="#FFD6B3" transform="rotate(-80 66 208)"/>

  <!-- Other arm relaxed along body -->
  <ellipse cx="148" cy="222" rx="28" ry="8" fill="#FFD6B3" transform="rotate(10 148 222)"/>

  <!-- Tiny starfish on sand -->
  <polygon points="218,265 220,272 227,272 222,277 224,284 218,279 212,284 214,277 209,272 216,272" fill="#FF8C42" opacity="0.7" transform="scale(0.6) translate(148,178)"/>
</svg>
