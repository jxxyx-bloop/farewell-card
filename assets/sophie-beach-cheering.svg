<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Confetti -->
  <rect x="30" y="20" width="10" height="6" rx="2" fill="#FF6B6B" transform="rotate(30 35 23)"/>
  <rect x="185" y="15" width="10" height="6" rx="2" fill="#FFD700" transform="rotate(-20 190 18)"/>
  <rect x="55" y="40" width="8" height="5" rx="2" fill="#26C6DA" transform="rotate(45 59 42)"/>
  <rect x="165" y="35" width="8" height="5" rx="2" fill="#FF9EC8" transform="rotate(-40 169 37)"/>
  <rect x="20" y="55" width="7" height="4" rx="2" fill="#FFD700" transform="rotate(15 23 57)"/>
  <rect x="200" y="50" width="7" height="4" rx="2" fill="#FF8C42" transform="rotate(-25 203 52)"/>
  <circle cx="145" cy="25" r="4" fill="#FF6B6B"/>
  <circle cx="90" cy="18" r="3" fill="#26C6DA"/>
  <circle cx="210" cy="70" r="3" fill="#FF9EC8"/>

  <!-- Hair back -->
  <ellipse cx="120" cy="135" rx="72" ry="70" fill="#FF8C42"/>

  <!-- Face -->
  <circle cx="120" cy="153" r="68" fill="#FFD6B3"/>

  <!-- Cheeks -->
  <ellipse cx="84" cy="168" rx="15" ry="10" fill="#FFAAAA" opacity="0.60"/>
  <ellipse cx="156" cy="168" rx="15" ry="10" fill="#FFAAAA" opacity="0.60"/>

  <!-- Eyes — big excited -->
  <circle cx="97" cy="146" r="13" fill="#222"/>
  <circle cx="143" cy="146" r="13" fill="#222"/>
  <circle cx="92" cy="141" r="5" fill="white"/>
  <circle cx="138" cy="141" r="5" fill="white"/>
  <circle cx="100" cy="151" r="2" fill="white"/>
  <circle cx="146" cy="151" r="2" fill="white"/>

  <!-- Wide open happy mouth -->
  <path d="M86,176 Q120,210 154,176" fill="#333" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M86,176 Q120,196 154,176" fill="#FF9999"/>
  <path d="M96,176 Q120,187 144,176" fill="white"/>

  <!-- Hair strands -->
  <path d="M54,125 Q44,78 90,70" stroke="#FF8C42" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M186,125 Q196,78 150,70" stroke="#FF8C42" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Bow -->
  <path d="M106,82 Q120,68 134,82 Q120,96 106,82Z" fill="#FF9EC8"/>
  <circle cx="120" cy="82" r="7" fill="#FF6BA8"/>

  <!-- Arms raised high in cheer -->
  <ellipse cx="36" cy="185" rx="26" ry="13" fill="#FFD6B3" transform="rotate(-70 36 185)"/>
  <ellipse cx="204" cy="185" rx="26" ry="13" fill="#FFD6B3" transform="rotate(70 204 185)"/>

  <!-- Little hands at top -->
  <circle cx="44" cy="148" r="12" fill="#FFD6B3"/>
  <circle cx="196" cy="148" r="12" fill="#FFD6B3"/>

  <!-- Body / teal swimsuit -->
  <ellipse cx="120" cy="248" rx="50" ry="34" fill="#26C6DA"/>
  <path d="M86,228 Q120,246 154,228" stroke="#00ACC1" stroke-width="3" fill="none"/>

  <!-- Star burst behind her -->
  <polygon points="120,92 125,108 142,108 129,118 134,134 120,124 106,134 111,118 98,108 115,108" fill="#FFD700" opacity="0.4"/>
</svg>
