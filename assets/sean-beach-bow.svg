<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Sand at bottom -->
  <path d="M0,240 Q120,225 240,240 L240,300 L0,300Z" fill="#F5DEB3"/>

  <!-- Ocean far back -->
  <rect x="0" y="200" width="240" height="38" fill="#80DEEA" opacity="0.5"/>

  <!-- Hair — bowing so hair falls forward -->
  <ellipse cx="120" cy="145" rx="74" ry="72" fill="#CC2200"/>
  <!-- Hair falls forward from bowing -->
  <ellipse cx="120" cy="108" rx="50" ry="30" fill="#CC2200"/>
  <!-- Spiky bits even when bowing -->
  <polygon points="88,90 96,62 108,94" fill="#CC2200"/>
  <polygon points="116,84 124,54 136,86" fill="#CC2200"/>
  <polygon points="142,90 152,64 162,92" fill="#CC2200"/>

  <!-- Face angled downward (bowing) -->
  <circle cx="120" cy="160" r="65" fill="#FFD6B3"/>

  <!-- Cheeks -->
  <ellipse cx="86" cy="172" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>
  <ellipse cx="154" cy="172" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>

  <!-- Eyes — downcast in bow (happy squint) -->
  <path d="M94,158 Q104,148 114,158" stroke="#333" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M126,158 Q136,148 146,158" stroke="#333" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Warm gentle smile -->
  <path d="M93,185 Q120,205 147,185" fill="#FF9999" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M93,185 Q120,198 147,185" fill="white"/>

  <!-- Body — bowing forward, ocean blue beach shirt -->
  <ellipse cx="120" cy="248" rx="58" ry="40" fill="#00ACC1" transform="rotate(-5 120 248)"/>
  <!-- Shirt collar -->
  <path d="M105,215 Q120,225 135,215" stroke="#0097A7" stroke-width="3" fill="none"/>
  <!-- Shirt floral pattern -->
  <circle cx="100" cy="245" r="8" fill="#FF6B6B" opacity="0.35"/>
  <circle cx="138" cy="252" r="8" fill="#FF9EC8" opacity="0.35"/>
  <circle cx="118" cy="262" r="7" fill="#FFD700" opacity="0.35"/>
  <circle cx="82" cy="260" r="6" fill="#FF8C42" opacity="0.35"/>

  <!-- Arms extended forward and downward in bow -->
  <ellipse cx="52" cy="252" rx="32" ry="13" fill="#00ACC1" transform="rotate(-20 52 252)"/>
  <ellipse cx="188" cy="252" rx="32" ry="13" fill="#00ACC1" transform="rotate(20 188 252)"/>

  <!-- Hands -->
  <circle cx="28" cy="258" r="12" fill="#FFD6B3"/>
  <circle cx="212" cy="258" r="12" fill="#FFD6B3"/>

  <!-- Sparkle / respect aura -->
  <text x="18" y="135" font-size="18" opacity="0.6">✨</text>
  <text x="190" y="130" font-size="16" opacity="0.6">🌟</text>

  <!-- Shell on sand -->
  <ellipse cx="190" cy="252" rx="14" ry="9" fill="#FF8C42" opacity="0.5" transform="rotate(-20 190 252)"/>
  <path d="M180,248 Q190,238 200,248" stroke="#FF6B35" stroke-width="2" fill="none"/>
</svg>
