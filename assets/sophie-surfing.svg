<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Wave -->
  <path d="M0,240 Q40,210 80,230 Q120,250 160,220 Q200,190 240,215 L240,300 L0,300Z" fill="#80DEEA"/>
  <path d="M0,255 Q50,235 100,248 Q150,261 200,240 Q220,233 240,238 L240,300 L0,300Z" fill="#26C6DA"/>

  <!-- Surfboard -->
  <ellipse cx="120" cy="248" rx="90" ry="18" fill="#FF8C42" transform="rotate(-8 120 248)"/>
  <ellipse cx="120" cy="248" rx="78" ry="12" fill="#FFB347" transform="rotate(-8 120 248)"/>
  <line x1="80" y1="242" x2="160" y2="254" stroke="#FF6B35" stroke-width="3"/>

  <!-- Hair back -->
  <ellipse cx="120" cy="115" rx="72" ry="70" fill="#FF8C42"/>

  <!-- Face -->
  <circle cx="120" cy="133" r="68" fill="#FFD6B3"/>

  <!-- Cheeks -->
  <ellipse cx="86" cy="150" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>
  <ellipse cx="154" cy="150" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>

  <!-- Eyes — happy squint for balance -->
  <circle cx="97" cy="128" r="12" fill="#222"/>
  <circle cx="143" cy="128" r="12" fill="#222"/>
  <circle cx="93" cy="124" r="4" fill="white"/>
  <circle cx="139" cy="124" r="4" fill="white"/>

  <!-- Smile -->
  <path d="M90,158 Q120,185 150,158" fill="#FF9999" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M90,158 Q120,172 150,158" fill="white"/>

  <!-- Hair strands -->
  <path d="M54,108 Q44,62 88,54" stroke="#FF8C42" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M186,108 Q196,62 152,54" stroke="#FF8C42" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Ponytail blowing in wind -->
  <path d="M170,80 Q210,60 230,90 Q210,100 175,110" fill="#FF8C42"/>

  <!-- Arms spread wide for balance -->
  <ellipse cx="42" cy="190" rx="26" ry="13" fill="#FFD6B3" transform="rotate(-20 42 190)"/>
  <ellipse cx="198" cy="185" rx="26" ry="13" fill="#FFD6B3" transform="rotate(20 198 185)"/>

  <!-- Body / teal swimsuit -->
  <ellipse cx="120" cy="218" rx="50" ry="32" fill="#26C6DA"/>

  <!-- Sun in corner -->
  <circle cx="30" cy="38" r="20" fill="#FFD700"/>
  <line x1="30" y1="10" x2="30" y2="2" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="20" x2="54" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="38" x2="66" y2="38" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="20" x2="4" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
</svg>
