<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Water surface -->
  <path d="M0,215 Q30,200 60,210 Q90,220 120,205 Q150,190 180,205 Q210,220 240,210 L240,300 L0,300Z" fill="#80DEEA"/>
  <path d="M0,232 Q40,220 80,228 Q120,236 160,224 Q200,212 240,224 L240,300 L0,300Z" fill="#26C6DA"/>

  <!-- Bubbles -->
  <circle cx="175" cy="170" r="6" fill="none" stroke="#80DEEA" stroke-width="2"/>
  <circle cx="188" cy="145" r="4" fill="none" stroke="#80DEEA" stroke-width="2"/>
  <circle cx="180" cy="120" r="3" fill="none" stroke="#80DEEA" stroke-width="1.5"/>

  <!-- Hair back -->
  <ellipse cx="120" cy="108" rx="72" ry="68" fill="#CC2200"/>
  <!-- Spiky hair -->
  <polygon points="60,80 72,48 84,82" fill="#CC2200"/>
  <polygon points="90,65 100,32 112,68" fill="#CC2200"/>
  <polygon points="120,60 128,26 140,62" fill="#CC2200"/>
  <polygon points="148,68 160,36 170,72" fill="#CC2200"/>

  <!-- Snorkel mask — big round goggle frame -->
  <circle cx="120" cy="132" r="62" fill="#00ACC1" opacity="0.85"/>
  <circle cx="120" cy="132" r="56" fill="#E8F9F8"/>

  <!-- Face inside mask -->
  <circle cx="120" cy="132" r="52" fill="#FFD6B3"/>

  <!-- Cheeks -->
  <ellipse cx="88" cy="148" rx="13" ry="9" fill="#FFAAAA" opacity="0.55"/>
  <ellipse cx="152" cy="148" rx="13" ry="9" fill="#FFAAAA" opacity="0.55"/>

  <!-- Eyes — wide surprised open underwater -->
  <circle cx="97" cy="125" r="13" fill="#222"/>
  <circle cx="143" cy="125" r="13" fill="#222"/>
  <circle cx="92" cy="120" r="5" fill="white"/>
  <circle cx="138" cy="120" r="5" fill="white"/>

  <!-- O-shaped mouth for surprise/breathing -->
  <ellipse cx="120" cy="156" rx="12" ry="10" fill="#333"/>
  <ellipse cx="120" cy="154" rx="8" ry="6" fill="#FF9999"/>

  <!-- Snorkel tube -->
  <path d="M175,100 Q200,80 200,40 Q200,20 185,20" stroke="#FF8C42" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="185" cy="18" rx="12" ry="7" fill="#FF8C42"/>

  <!-- Mask strap -->
  <path d="M60,115 Q50,132 62,148" stroke="#00ACC1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M180,115 Q190,132 178,148" stroke="#00ACC1" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Body in water -->
  <ellipse cx="120" cy="225" rx="50" ry="28" fill="#00ACC1"/>
</svg>
