<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!-- Background palm leaf hints -->
  <path d="M0,40 Q40,20 60,70" stroke="#66BB6A" stroke-width="8" fill="none" opacity="0.4"/>
  <path d="M240,30 Q200,15 185,65" stroke="#66BB6A" stroke-width="8" fill="none" opacity="0.4"/>

  <!-- Flower lei around neck -->
  <circle cx="82" cy="230" r="12" fill="#FF6B6B"/>
  <circle cx="82" cy="230" r="6" fill="#FFD700"/>
  <circle cx="100" cy="218" r="11" fill="#FF9EC8"/>
  <circle cx="100" cy="218" r="5" fill="#FFD700"/>
  <circle cx="120" cy="214" r="12" fill="#FF8C42"/>
  <circle cx="120" cy="214" r="6" fill="#FFD700"/>
  <circle cx="140" cy="218" r="11" fill="#FF6B6B"/>
  <circle cx="140" cy="218" r="5" fill="#FFD700"/>
  <circle cx="158" cy="230" r="12" fill="#FF9EC8"/>
  <circle cx="158" cy="230" r="6" fill="#FFD700"/>

  <!-- Flower petals -->
  <circle cx="75" cy="218" r="7" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="89" cy="218" r="7" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="82" cy="212" r="7" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="82" cy="238" r="7" fill="#FF6B6B" opacity="0.7"/>

  <!-- Hair back -->
  <ellipse cx="120" cy="115" rx="72" ry="70" fill="#CC2200"/>
  <!-- Spiky hair -->
  <polygon points="60,85 72,52 84,88" fill="#CC2200"/>
  <polygon points="88,70 100,36 114,72" fill="#CC2200"/>
  <polygon points="118,65 128,30 142,65" fill="#CC2200"/>
  <polygon points="148,70 162,38 172,74" fill="#CC2200"/>

  <!-- Face -->
  <circle cx="120" cy="137" r="68" fill="#FFD6B3"/>

  <!-- Cheeks -->
  <ellipse cx="85" cy="153" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>
  <ellipse cx="155" cy="153" rx="14" ry="9" fill="#FFAAAA" opacity="0.55"/>

  <!-- Eyes — friendly warm -->
  <circle cx="97" cy="130" r="12" fill="#222"/>
  <circle cx="143" cy="130" r="12" fill="#222"/>
  <circle cx="93" cy="126" r="4" fill="white"/>
  <circle cx="139" cy="126" r="4" fill="white"/>

  <!-- Smile — friendly aloha grin -->
  <path d="M89,162 Q120,190 151,162" fill="#FF9999" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M89,162 Q120,176 151,162" fill="white"/>

  <!-- Body — ocean blue with floral shirt pattern hint -->
  <ellipse cx="120" cy="240" rx="54" ry="35" fill="#00ACC1"/>
  <!-- Shirt floral pattern -->
  <circle cx="100" cy="235" r="7" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="140" cy="242" r="7" fill="#FF9EC8" opacity="0.4"/>
  <circle cx="118" cy="255" r="6" fill="#FFD700" opacity="0.4"/>

  <!-- Arms — one raised in wave gesture -->
  <ellipse cx="44" cy="205" rx="26" ry="13" fill="#FFD6B3" transform="rotate(-55 44 205)"/>
  <circle cx="36" cy="180" r="13" fill="#FFD6B3"/>

  <ellipse cx="196" cy="220" rx="24" ry="12" fill="#FFD6B3" transform="rotate(20 196 220)"/>

  <!-- Waving hand fingers -->
  <line x1="30" y1="172" x2="26" y2="162" stroke="#FFD6B3" stroke-width="5" stroke-linecap="round"/>
  <line x1="37" y1="170" x2="34" y2="160" stroke="#FFD6B3" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="171" x2="42" y2="161" stroke="#FFD6B3" stroke-width="5" stroke-linecap="round"/>
</svg>
